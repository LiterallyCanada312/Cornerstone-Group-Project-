
<h2 class="sr-only">Room layout editor — draw obstacles and endpoints, then export to JSON</h2>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { display: flex; gap: 0; height: 600px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.sidebar { width: 220px; min-width: 220px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-section { padding: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.sidebar-section h3 { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.tool-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 13px; cursor: pointer; margin-bottom: 4px; text-align: left; transition: background 0.1s; }
.tool-btn:hover { background: var(--color-background-secondary); }
.tool-btn.active { background: var(--color-background-secondary); border-color: var(--color-border-primary); font-weight: 500; }
.tool-btn i { font-size: 15px; color: var(--color-text-secondary); }
.tool-btn.active i { color: var(--color-text-primary); }
.room-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.room-inputs label { font-size: 11px; color: var(--color-text-secondary); display: block; margin-bottom: 2px; }
.room-inputs input { width: 100%; font-size: 13px; padding: 4px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.res-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.res-row label { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
.res-row input { flex: 1; font-size: 13px; padding: 4px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.prop-row { margin-bottom: 6px; }
.prop-row label { font-size: 11px; color: var(--color-text-secondary); display: block; margin-bottom: 2px; }
.prop-row input, .prop-row select { width: 100%; font-size: 13px; padding: 4px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.objects-list { flex: 1; overflow-y: auto; padding: 8px; }
.obj-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 12px; border: 0.5px solid transparent; margin-bottom: 2px; }
.obj-item:hover { background: var(--color-background-secondary); }
.obj-item.selected { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
.obj-item-label { display: flex; align-items: center; gap: 6px; color: var(--color-text-primary); }
.obj-item-del { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 2px; border-radius: 3px; font-size: 14px; line-height: 1; }
.obj-item-del:hover { color: var(--color-text-danger); }
.canvas-area { flex: 1; position: relative; overflow: hidden; background: var(--color-background-tertiary); }
canvas { display: block; }
.canvas-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; padding: 4px 12px; pointer-events: none; }
.bottom-bar { padding: 10px 12px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; gap: 8px; }
.btn-primary { flex: 1; padding: 7px 12px; border: none; border-radius: var(--border-radius-md); background: var(--color-text-primary); color: var(--color-background-primary); font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { flex: 1; padding: 7px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: var(--color-background-secondary); }
.color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Room</h3>
      <div class="room-inputs">
        <div><label>Width (m)</label><input type="number" id="roomW" value="20" min="1" max="100" step="1" onchange="redraw()"></div>
        <div><label>Height (m)</label><input type="number" id="roomH" value="15" min="1" max="100" step="1" onchange="redraw()"></div>
      </div>
      <div class="res-row">
        <label>Resolution</label>
        <input type="number" id="resolution" value="1.0" min="0.1" max="5" step="0.1">
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Add object</h3>
      <button class="tool-btn active" id="tool-rect" onclick="setTool('rect')"><i class="ti ti-rectangle" aria-hidden="true"></i>Rectangle</button>
      <button class="tool-btn" id="tool-circle" onclick="setTool('circle')"><i class="ti ti-circle" aria-hidden="true"></i>Circle</button>
      <button class="tool-btn" id="tool-line" onclick="setTool('line')"><i class="ti ti-minus" aria-hidden="true"></i>Line</button>
      <button class="tool-btn" id="tool-endpoint" onclick="setTool('endpoint')"><i class="ti ti-plug" aria-hidden="true"></i>Endpoint</button>
    </div>

    <div class="sidebar-section" id="props-panel">
      <h3>Properties</h3>
      <div class="prop-row"><label>Label / ID</label><input type="text" id="prop-label" value="" placeholder="optional"></div>
      <div id="extra-props"></div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column; padding-bottom:4px;">
      <h3>Objects (<span id="obj-count">0</span>)</h3>
      <div class="objects-list" id="objects-list"></div>
    </div>

    <div class="bottom-bar">
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
      <button class="btn-primary" onclick="exportJSON()"><i class="ti ti-download" aria-hidden="true"></i> Export JSON</button>
    </div>
  </div>

  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="canvas-hint" id="hint">Click and drag to draw a rectangle</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasArea = canvas.parentElement;

let tool = 'rect';
let objects = [];
let selectedId = null;
let drawing = false;
let startX, startY, curX, curY;
let linePoints = [];
let scale = 20;
let offsetX = 20, offsetY = 20;
let idCounter = 0;

const TYPE_COLORS = {
  rect: '#378ADD',
  circle: '#1D9E75',
  line: '#BA7517',
  endpoint: '#D85A30'
};

const HINTS = {
  rect: 'Click and drag to draw a rectangle',
  circle: 'Click and drag to draw a circle',
  line: 'Click to add points, double-click to finish line',
  endpoint: 'Click to place an endpoint'
};

function uid() { return 'obj_' + (++idCounter); }

function resize() {
  const rect = canvasArea.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  redraw();
}

function worldToCanvas(wx, wy) {
  return [offsetX + wx * scale, offsetY + wy * scale];
}

function canvasToWorld(cx, cy) {
  return [(cx - offsetX) / scale, (cy - offsetY) / scale];
}

function redraw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const rW = parseFloat(document.getElementById('roomW').value) || 20;
  const rH = parseFloat(document.getElementById('roomH').value) || 15;

  const availW = W - 40, availH = H - 40;
  scale = Math.min(availW / rW, availH / rH);
  offsetX = (W - rW * scale) / 2;
  offsetY = (H - rH * scale) / 2;

  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.fillStyle = isDark ? '#1e1e1e' : '#f8f8f6';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = isDark ? '#2a2a28' : '#ffffff';
  ctx.strokeStyle = isDark ? '#444' : '#ccc';
  ctx.lineWidth = 1;
  ctx.fillRect(offsetX, offsetY, rW * scale, rH * scale);
  ctx.strokeRect(offsetX, offsetY, rW * scale, rH * scale);

  const gridStep = scale;
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= rW; x++) {
    ctx.beginPath();
    const [cx] = worldToCanvas(x, 0);
    ctx.moveTo(cx, offsetY);
    ctx.lineTo(cx, offsetY + rH * scale);
    ctx.stroke();
  }
  for (let y = 0; y <= rH; y++) {
    ctx.beginPath();
    const [, cy] = worldToCanvas(0, y);
    ctx.moveTo(offsetX, cy);
    ctx.lineTo(offsetX + rW * scale, cy);
    ctx.stroke();
  }

  for (const obj of objects) {
    drawObject(obj, obj.id === selectedId);
  }

  if (drawing) {
    ctx.globalAlpha = 0.6;
    if (tool === 'rect') {
      const [x1, y1] = worldToCanvas(Math.min(startX, curX), Math.min(startY, curY));
      const w = Math.abs(curX - startX) * scale, h = Math.abs(curY - startY) * scale;
      ctx.fillStyle = TYPE_COLORS.rect + '44';
      ctx.strokeStyle = TYPE_COLORS.rect;
      ctx.lineWidth = 1.5;
      ctx.fillRect(x1, y1, w, h);
      ctx.strokeRect(x1, y1, w, h);
    } else if (tool === 'circle') {
      const [cx, cy] = worldToCanvas((startX + curX) / 2, (startY + curY) / 2);
      const r = Math.hypot(curX - startX, curY - startY) / 2 * scale;
      ctx.fillStyle = TYPE_COLORS.circle + '44';
      ctx.strokeStyle = TYPE_COLORS.circle;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  if (tool === 'line' && linePoints.length > 0) {
    ctx.strokeStyle = TYPE_COLORS.line;
    ctx.lineWidth = 2;
    ctx.beginPath();
    const [sx, sy] = worldToCanvas(linePoints[0][0], linePoints[0][1]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < linePoints.length; i++) {
      const [lx, ly] = worldToCanvas(linePoints[i][0], linePoints[i][1]);
      ctx.lineTo(lx, ly);
    }
    if (drawing) {
      const [ex, ey] = worldToCanvas(curX, curY);
      ctx.lineTo(ex, ey);
    }
    ctx.stroke();
    for (const pt of linePoints) {
      const [px, py] = worldToCanvas(pt[0], pt[1]);
      ctx.fillStyle = TYPE_COLORS.line;
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawObject(obj, selected) {
  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const color = TYPE_COLORS[obj.shape] || '#888';
  ctx.globalAlpha = selected ? 1 : 0.85;

  if (obj.shape === 'rect') {
    const [x, y] = worldToCanvas(obj.x, obj.y);
    const w = obj.width * scale, h = obj.height * scale;
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = selected ? color : color + 'aa';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    if (obj.label) {
      ctx.fillStyle = isDark ? '#fff' : '#222';
      ctx.font = '11px var(--font-sans, sans-serif)';
      ctx.fillText(obj.label, x + 4, y + 14);
    }
  } else if (obj.shape === 'circle') {
    const [cx, cy] = worldToCanvas(obj.cx, obj.cy);
    const r = obj.radius * scale;
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = selected ? color : color + 'aa';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (obj.label) {
      ctx.fillStyle = isDark ? '#fff' : '#222';
      ctx.font = '11px var(--font-sans, sans-serif)';
      ctx.textAlign = 'center';
      ctx.fillText(obj.label, cx, cy + 4);
      ctx.textAlign = 'left';
    }
  } else if (obj.shape === 'line') {
    ctx.strokeStyle = selected ? color : color + 'cc';
    ctx.lineWidth = selected ? 2.5 : 1.5;
    ctx.beginPath();
    const [sx, sy] = worldToCanvas(obj.points[0][0], obj.points[0][1]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < obj.points.length; i++) {
      const [lx, ly] = worldToCanvas(obj.points[i][0], obj.points[i][1]);
      ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    for (const pt of obj.points) {
      const [px, py] = worldToCanvas(pt[0], pt[1]);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (obj.shape === 'endpoint') {
    const [cx, cy] = worldToCanvas(obj.x, obj.y);
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, selected ? 7 : 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (obj.label) {
      ctx.fillStyle = isDark ? '#fff' : '#222';
      ctx.font = '11px var(--font-sans, sans-serif)';
      ctx.fillText(obj.label, cx + 9, cy + 4);
    }
  }

  if (selected) {
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 3]);
    if (obj.shape === 'rect') {
      const [x, y] = worldToCanvas(obj.x, obj.y);
      ctx.strokeRect(x - 2, y - 2, obj.width * scale + 4, obj.height * scale + 4);
    }
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  return canvasToWorld(cx, cy);
}

canvas.addEventListener('mousedown', (e) => {
  const [wx, wy] = getCanvasPos(e);
  if (tool === 'endpoint') {
    const label = document.getElementById('prop-label').value || ('EP' + (objects.filter(o => o.shape === 'endpoint').length + 1));
    const connects = document.getElementById('prop-connects')?.value || null;
    const ctype = document.getElementById('prop-ctype')?.value || 'generic';
    const grp = document.getElementById('prop-group')?.value || '';
    const obj = { id: uid(), shape: 'endpoint', x: parseFloat(wx.toFixed(2)), y: parseFloat(wy.toFixed(2)), label, connects_to: connects || null, cable_type: ctype, group: grp };
    objects.push(obj);
    selectedId = obj.id;
    renderList();
    redraw();
    return;
  }
  if (tool === 'line') {
    if (!drawing) { drawing = true; linePoints = [[parseFloat(wx.toFixed(2)), parseFloat(wy.toFixed(2))]]; }
    else { linePoints.push([parseFloat(wx.toFixed(2)), parseFloat(wy.toFixed(2))]); }
    curX = wx; curY = wy;
    redraw();
    return;
  }
  drawing = true;
  startX = wx; startY = wy; curX = wx; curY = wy;
});

canvas.addEventListener('mousemove', (e) => {
  const [wx, wy] = getCanvasPos(e);
  curX = wx; curY = wy;
  if (drawing || (tool === 'line' && linePoints.length > 0)) redraw();
});

canvas.addEventListener('mouseup', (e) => {
  if (!drawing) return;
  const [wx, wy] = getCanvasPos(e);
  if (tool === 'rect') {
    const x = parseFloat(Math.min(startX, wx).toFixed(2));
    const y = parseFloat(Math.min(startY, wy).toFixed(2));
    const w = parseFloat(Math.abs(wx - startX).toFixed(2));
    const h = parseFloat(Math.abs(wy - startY).toFixed(2));
    if (w > 0.1 && h > 0.1) {
      const label = document.getElementById('prop-label').value || '';
      const obj = { id: uid(), shape: 'rect', label, x, y, width: w, height: h };
      objects.push(obj);
      selectedId = obj.id;
      renderList();
    }
    drawing = false;
  } else if (tool === 'circle') {
    const cx = parseFloat(((startX + wx) / 2).toFixed(2));
    const cy = parseFloat(((startY + wy) / 2).toFixed(2));
    const r = parseFloat((Math.hypot(wx - startX, wy - startY) / 2).toFixed(2));
    if (r > 0.1) {
      const label = document.getElementById('prop-label').value || '';
      const obj = { id: uid(), shape: 'circle', label, cx, cy, radius: r };
      objects.push(obj);
      selectedId = obj.id;
      renderList();
    }
    drawing = false;
  }
  redraw();
});

canvas.addEventListener('dblclick', (e) => {
  if (tool === 'line' && linePoints.length >= 2) {
    const label = document.getElementById('prop-label').value || '';
    const thick = parseFloat(document.getElementById('prop-thick')?.value || 0.5);
    const obj = { id: uid(), shape: 'line', label, points: [...linePoints], thickness: thick };
    objects.push(obj);
    selectedId = obj.id;
    linePoints = [];
    drawing = false;
    renderList();
    redraw();
  }
});

canvas.addEventListener('click', (e) => {
  if (tool !== 'select') return;
  const [wx, wy] = getCanvasPos(e);
  selectedId = null;
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    if (hitTest(obj, wx, wy)) { selectedId = obj.id; break; }
  }
  renderList();
  redraw();
});

function hitTest(obj, wx, wy) {
  if (obj.shape === 'rect') return wx >= obj.x && wx <= obj.x + obj.width && wy >= obj.y && wy <= obj.y + obj.height;
  if (obj.shape === 'circle') return Math.hypot(wx - obj.cx, wy - obj.cy) <= obj.radius;
  if (obj.shape === 'endpoint') return Math.hypot(wx - obj.x, wy - obj.y) <= 0.8;
  return false;
}

function setTool(t) {
  if (tool === 'line' && linePoints.length >= 2) {
    const label = document.getElementById('prop-label').value || '';
    const thick = parseFloat(document.getElementById('prop-thick')?.value || 0.5);
    const obj = { id: uid(), shape: 'line', label, points: [...linePoints], thickness: thick };
    objects.push(obj);
    selectedId = obj.id;
    linePoints = [];
    drawing = false;
    renderList();
  }
  tool = t;
  drawing = false;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t)?.classList.add('active');
  document.getElementById('hint').textContent = HINTS[t] || '';

  const extra = document.getElementById('extra-props');
  if (t === 'line') {
    extra.innerHTML = '<div class="prop-row"><label>Thickness (m)</label><input type="number" id="prop-thick" value="0.5" min="0.1" step="0.1"></div>';
  } else if (t === 'endpoint') {
    extra.innerHTML = `
      <div class="prop-row"><label>Connects to (id)</label><input type="text" id="prop-connects" placeholder="leave blank if none"></div>
      <div class="prop-row"><label>Cable type</label><input type="text" id="prop-ctype" value="generic"></div>
      <div class="prop-row"><label>Group</label><input type="text" id="prop-group" placeholder="optional"></div>
    `;
  } else {
    extra.innerHTML = '';
  }
  redraw();
}

function renderList() {
  const list = document.getElementById('objects-list');
  document.getElementById('obj-count').textContent = objects.length;
  if (objects.length === 0) { list.innerHTML = '<div style="font-size:12px;color:var(--color-text-secondary);padding:8px 0;">No objects yet</div>'; return; }
  list.innerHTML = '';
  for (const obj of objects) {
    const div = document.createElement('div');
    div.className = 'obj-item' + (obj.id === selectedId ? ' selected' : '');
    const col = TYPE_COLORS[obj.shape] || '#888';
    div.innerHTML = `<span class="obj-item-label"><span class="color-dot" style="background:${col}"></span>${obj.label || obj.id} <span style="color:var(--color-text-secondary);font-size:11px">(${obj.shape})</span></span><button class="obj-item-del" title="delete">×</button>`;
    div.querySelector('.obj-item-del').onclick = (e) => { e.stopPropagation(); objects = objects.filter(o => o.id !== obj.id); if (selectedId === obj.id) selectedId = null; renderList(); redraw(); };
    div.onclick = () => { selectedId = obj.id; renderList(); redraw(); };
    list.appendChild(div);
  }
}

function clearAll() {
  if (objects.length === 0) return;
  objects = [];
  selectedId = null;
  linePoints = [];
  drawing = false;
  renderList();
  redraw();
}

function exportJSON() {
  const rW = parseFloat(document.getElementById('roomW').value) || 20;
  const rH = parseFloat(document.getElementById('roomH').value) || 15;
  const res = parseFloat(document.getElementById('resolution').value) || 1.0;

  const obstacles = objects.filter(o => o.shape !== 'endpoint').map(obj => {
    if (obj.shape === 'rect') return { type: 'rect', label: obj.label, x: obj.x, y: obj.y, width: obj.width, height: obj.height };
    if (obj.shape === 'circle') return { type: 'circle', label: obj.label, cx: obj.cx, cy: obj.cy, radius: obj.radius };
    if (obj.shape === 'line') return { type: 'line', label: obj.label, points: obj.points, thickness: obj.thickness };
    return obj;
  });

  const endpoints = objects.filter(o => o.shape === 'endpoint').map(obj => ({
    id: obj.label || obj.id,
    x: obj.x,
    y: obj.y,
    connects_to: obj.connects_to || null,
    cable_type: obj.cable_type || 'generic',
    group: obj.group || ''
  }));

  const json = { room: { width: rW, height: rH }, obstacles, endpoints, resolution: res };
  const jsonStr = JSON.stringify(json, null, 2);

  if (typeof sendPrompt === 'function') {
    sendPrompt('Here is the exported JSON layout:\n```json\n' + jsonStr + '\n```\nCan you review it and confirm it looks correct for the cable routing system?');
  } else {
    fetch('/save', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: jsonStr})
      .then(r => {
        if (r.ok) {
          document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif">Layout saved &mdash; you can close this tab.</div>';
        } else {
          alert('Save failed: server returned ' + r.status);
        }
      })
      .catch(err => alert('Save failed: ' + err));
  }
}

setTool('rect');
renderList();

const ro = new ResizeObserver(resize);
ro.observe(canvasArea);
resize();
</script>
